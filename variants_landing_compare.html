<!doctype html>
<html lang="ko">
<head>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
    #root { width: 100%; height: 100vh; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="variants/Variant_A_Notebook.jsx"></script>
  <script type="text/babel" src="variants/Variant_B_Atlas.jsx"></script>
  <script type="text/babel" src="variants/Variant_C_BuildLog.jsx"></script>

  <script type="text/babel">
    const { useEffect } = React;

    function App() {
      const VariantA = window.VariantA_Notebook;
      const VariantB = window.VariantB_Atlas;

      return (
        <DesignCanvas>

          >
            <DCArtboard
              id="a"
              label="A · Notebook (서사형)"
              width={1440}
              height={2200}
            >
              <VariantA />
            </DCArtboard>
            <DCArtboard
              id="b"
              label="B · Atlas (스펙 시트)"
              width={1440}
              height={2200}
            >
              <VariantB />
            </DCArtboard>
            <DCArtboard

              width={1440}
              height={2200}

              <VariantC />

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
