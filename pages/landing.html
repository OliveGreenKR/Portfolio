<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JCH / Portfolio — 사용은 단순하게, 구조는 확장에 유연하게</title>
  <link rel="stylesheet" href="../src/styles/tokens.css">
  <style>
    html, body { margin: 0; padding: 0; background: var(--paper); }
    html { scroll-behavior: smooth; }
    a { color: inherit; }
    [data-screen-label] { /* labelled for design comment context */ }

    /* ─── Responsive — inline-style override via !important */
    /* Tablet (≤ 980px): drop rail, collapse body grid, shrink hero */
    @media (max-width: 980px) {
      .l-header        { padding: 0 28px !important; gap: 16px !important; }
      .l-body          { grid-template-columns: minmax(0, 1fr) !important; padding: 0 28px !important; gap: 0 !important; }
      .l-rail          { display: none !important; }
      .l-hero          { grid-template-columns: 1fr !important; gap: 32px !important; padding-top: 56px !important; padding-bottom: 48px !important; }
      .l-hero h1       { font-size: 44px !important; }
      .l-portrait      { width: 180px !important; height: 216px !important; }
      .l-rowcard       { grid-template-columns: 44px 200px minmax(0,1fr) 20px !important; gap: 20px !important; }
      .l-rowcard .l-thumb,
      .l-rowcard > div:nth-child(2) { width: 200px !important; height: 112px !important; }
      .l-labs-grid     { grid-template-columns: repeat(2, 1fr) !important; }
    }
    /* Mobile (≤ 640px): single column everywhere */
    @media (max-width: 640px) {
      .l-header        { padding: 0 18px !important; height: 56px !important; }
      .l-header > div:last-child { gap: 14px !important; font-size: 11px !important; letter-spacing: 0.08em !important; }
      .l-body          { padding: 0 18px !important; }
      .l-hero          { padding-top: 40px !important; padding-bottom: 36px !important; gap: 24px !important; }
      .l-hero h1       { font-size: 32px !important; line-height: 1.18 !important; margin-bottom: 20px !important; }
      .l-hero p        { font-size: 15px !important; margin-bottom: 24px !important; }
      .l-hero div[style*="repeat(4"] { grid-template-columns: repeat(2, max-content) !important; gap: 20px !important; }
      .l-portrait      { width: 140px !important; height: 168px !important; }
      .l-rowcard       { grid-template-columns: 1fr !important; gap: 14px !important; padding: 24px 0 !important; }
      .l-rowcard > div:nth-child(1) { display: none !important; }
      .l-rowcard > div:nth-child(2) { width: 100% !important; height: 180px !important; }
      .l-rowcard > div:nth-child(4) { display: none !important; }
      .l-rowcard h3    { font-size: 24px !important; }
      .l-rowcard p     { font-size: 14.5px !important; }
      .l-labs-grid     { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body data-screen-label="00 Landing">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="landing/data.js"></script>
  <script type="text/babel" src="landing/LandingPage.styles.jsx"></script>
  <script type="text/babel" src="landing/LandingPage.cards.jsx"></script>
  <script type="text/babel" src="landing/LandingPage.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<window.LandingPage />);
  </script>
</body>
</html>
